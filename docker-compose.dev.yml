# CentralChat — Development (hot-reload)
#
#   docker compose -f docker-compose.dev.yml up -d --build
#
# Com OIDC:   docker compose -f docker-compose.dev.yml -f docker-compose.oidc.yml up -d --build
# Com monitoring: docker compose -f docker-compose.dev.yml -f docker-compose.monitoring.yml up -d --build
# Migração manual: docker compose -f docker-compose.dev.yml --profile tools run --rm migrate
#
# Hot-reload: altera código → recarrega sozinho. Zero rebuild.
# NÃO depende de .env na raiz — vars vêm dos .env de cada serviço.

services:
  # ═══════════════ Init: permissões ═══════════════
  orchestrator-init:
    image: docker.io/library/alpine:3.21
    container_name: central-orchestrator-init
    restart: unless-stopped
    user: "0:0"
    volumes:
      - ./vhosts/CentralChat_Backend/.central_root:/central:z
    command:
      - sh
      - -ec
      - |
        mkdir -p /central/state /central/config
        chown -R 1000:1000 /central/state /central/config 2>/dev/null || true
        echo "orchestrator-init: done (idle)"
        exec tail -f /dev/null

  # ═══════════════ Postgres + pgvector ═══════════════
  postgres:
    build:
      context: ./vhosts/CentralChat_Backend/deploy/postgres
      dockerfile: Dockerfile
    image: central-postgres-pgvector:16
    container_name: central-postgres-test
    restart: unless-stopped
    env_file:
      - ./vhosts/CentralChat_Backend/.env
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - central_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U central -d central_memory
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      default:
        aliases:
          - memory-db

  # ═══════════════ DB migrations (profile: tools) ═══════════════
  migrate:
    profiles:
      - tools
    build:
      context: ./vhosts/CentralChat_Backend
      dockerfile: Dockerfile
    image: central-orchestrator-migrate:dev
    env_file:
      - ./vhosts/CentralChat_Backend/.env
    volumes:
      - ./vhosts/CentralChat_Backend/migrations:/app/migrations:ro,z
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["python", "scripts/run_migrations.py"]

  # ═══════════════ Orchestrator (API, hot-reload) ═══════════════
  orchestrator:
    build:
      context: ./vhosts/CentralChat_Backend
      dockerfile: Dockerfile
    container_name: central-orchestrator
    user: "1000:1000"
    env_file:
      - ./vhosts/CentralChat_Backend/.env
    environment:
      CENTRAL_DEV_SEED: "1"
    ports:
      - "8004:8004"
    depends_on:
      orchestrator-init:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./vhosts/CentralChat_Backend/.central_root:/central:z
      - ./vhosts/CentralChat_Backend/app:/app/app:ro,z
      - ./vhosts/CentralChat_Backend/scripts:/app/scripts:ro,z
      - ./vhosts/CentralChat_Backend/migrations:/app/migrations:ro,z
      - .:/workspace:rw,z
    cap_drop:
      - ALL
    command:
      - uvicorn
      - app.server:create_app
      - --factory
      - --host
      - "0.0.0.0"
      - --port
      - "8004"
      - --reload
      - --reload-dir
      - /app/app
      - --log-level
      - info

  # ═══════════════ Web UI (TanStack Start + Bun, hot-reload) ═══════════════
  centralchat-web:
    build:
      context: ./vhosts/CentralChat_Frontend
      dockerfile: Dockerfile.dev
    container_name: central-centralchat-web
    env_file:
      - ./vhosts/CentralChat_Frontend/.env
    environment:
      VITE_ADMIN_URL: http://127.0.0.1:5175
    ports:
      - "5174:5174"
    depends_on:
      - orchestrator
    restart: unless-stopped
    volumes:
      - ./vhosts/CentralChat_Frontend/src:/app/src:ro,z
      - ./vhosts/CentralChat_Frontend/public:/app/public:ro,z
      - ./vhosts/CentralChat_Frontend/vite.config.ts:/app/vite.config.ts:ro,z

  # ═══════════════ Admin UI (dashboard supervisão) ═══════════════
  centralchat-admin:
    build:
      context: ./vhosts/centralchat_admin
      dockerfile: Dockerfile.dev
    container_name: central-centralchat-admin
    env_file:
      - ./vhosts/centralchat_admin/.env
    ports:
      - "5175:5175"
    depends_on:
      - orchestrator
    restart: unless-stopped
    volumes:
      - ./vhosts/centralchat_admin/src:/app/src:ro,z
      - ./vhosts/centralchat_admin/public:/app/public:ro,z
      - ./vhosts/centralchat_admin/vite.config.ts:/app/vite.config.ts:ro,z

  # ═══════════════ Browser-Use sidecar (profile: browser) ═══════════════
  browser-use:
    profiles:
      - browser
    build:
      context: ./vhosts/CentralChat_Backend/deploy/browser-use
    image: centralchat/browser-use:latest
    container_name: centralchat-browser-use
    ports:
      - "127.0.0.1:8081:8081"
    restart: unless-stopped
    environment:
      BROWSER_USE_HOST: "0.0.0.0"
      BROWSER_USE_PORT: "8081"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

volumes:
  central_pg_data:
