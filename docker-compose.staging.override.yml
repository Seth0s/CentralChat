# Onda C — staging flags (quotas, DLP, separation, pr_only default)
#   docker compose -f docker-compose.dev.yml -f docker-compose.e2e.override.yml \
#     -f docker-compose.staging.override.yml up -d

services:
  orchestrator:
    environment:
      CENTRAL_APP_ENV: staging
      CENTRAL_WRITE_MODE_DEFAULT: pr_only
      CENTRAL_APPROVAL_SEPARATION: "1"
      CENTRAL_QUOTA_ENABLED: "1"
      CENTRAL_DLP_ENABLED: "1"
      CENTRAL_AUDIT_RETENTION_DAYS: "365"
      CENTRAL_CLOUD_MODEL_ALLOWLIST: ""
      CENTRAL_JSON_LOGGING: "1"
      # CENTRAL_ALERT_SLACK_WEBHOOK_URL:
      # CENTRAL_ALERT_WEBHOOK_URL:
      # GitHub App (prefer over PAT) — preencher em staging real:
      # CENTRAL_GITHUB_APP_ID:
      # CENTRAL_GITHUB_APP_INSTALLATION_ID:
      # CENTRAL_GITHUB_APP_PRIVATE_KEY:
      # CENTRAL_GITHUB_REPO: org/repo
      # CENTRAL_SIEM_WEBHOOK_URLS: https://...
