apiVersion: v1
kind: Secret
metadata:
  name: {{ include "centralchat.fullname" . }}-secret
  labels:
    {{- include "centralchat.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | default "changeme" | quote }}
  CENTRAL_JWT_SECRET: {{ .Values.central.jwtSecret | default "change-me-in-production" | quote }}
